# REAL-HARDWARE companion to game_lightsout.yaml — No Friends Monday's truck.
# Two pins total, per the games plan: the 5 button lamps as an addressable
# chain on D1, the 5 buttons on a resistor ladder into the D0 ADC.
#
#   packages:                                      # no-friends-monday.yaml,
#     logic:    !include ../packages/logic.yaml    #  hardware flash
#     tripwire: !include ../packages/tripwire.yaml
#     game:     !include ../packages/game_lightsout.yaml
#     game_hw:  !include ../packages/game_lightsout_hw.yaml
#     dmx:      !include ../packages/dmx_out.yaml
#     platform: !include ../packages/hardware_s3.yaml
#
# LAMPS — from Tim's strip stash, ANY 5V addressable (WS2812B/SK6812 class).
# NOT 12V WS2811 sign stock: DB9-A pins 1/2 supply 5V. Set the chipset/order
# substitutions to match whatever strip gets grabbed (RGBW SK6812 also needs
# is_rgbw: true added on the light). Data path: D1 (GPIO2) -> 74AHCT125 (VCC
# 5V, IN box-side so the cable carries 5V-level data) -> 33-100R series ->
# DB9-A pin 4 -> truck. Lamps render the game's nfm_lamp_mask bitmask via a
# 50ms addressable_lambda — no state lives here.
#
# LADDER — 10k top resistor from 3V3 to the ADC node; each button grounds the
# node through its own resistor (E12 values, ~0.5V spacing):
#   btn1 = wire (0R) -> 0.00V     btn4 = 10k -> 1.65V
#   btn2 = 2.2k      -> 0.60V     btn5 = 22k -> 2.27V
#   btn3 = 4.7k      -> 1.06V     open       -> 3.3V
# Decode = window midpoints, 2-consecutive-sample confirmation (30ms apart)
# so a bounce can't land in a neighbor's window; the game script's own
# mode:single + 400ms tail is the cooldown. Simultaneous presses read as the
# lowest resistance — Lights-Out is a one-finger game, acceptable.
# NOT validated by validate_all.sh (adc/rmt need the esp32 platform).
substitutions:
  truck_data_pin: GPIO2     # XIAO D1 (db9-field-wiring.md: DB9-A pin 4)
  truck_ladder_pin: GPIO1   # XIAO D0 (DB9-A pin 3)
  truck_num_px: "5"
  truck_chipset: WS2812
  truck_rgb_order: GRB

light:
  - platform: esp32_rmt_led_strip
    id: truck_lamps
    pin: ${truck_data_pin}
    num_leds: ${truck_num_px}
    chipset: ${truck_chipset}
    rgb_order: ${truck_rgb_order}
    default_transition_length: 0s
    restore_mode: ALWAYS_ON
    name: "${room} truck lamps"
    internal: true
    effects:
      - addressable_lambda:
          name: "Truck Mask"
          update_interval: 50ms
          lambda: |-
            for (int i = 0; i < it.size(); i++)
              it[i] = ((id(nfm_lamp_mask) >> i) & 1)
                          ? esphome::Color(255, 170, 30)   // warm lamp amber
                          : esphome::Color::BLACK;

esphome:
  on_boot:
    - light.turn_on:
        id: truck_lamps
        brightness: 100%
        effect: "Truck Mask"

globals:
  - id: nfm_ladder_prev
    type: int
    initial_value: '0'    # last quantized reading (0 = open)
  - id: nfm_ladder_stable
    type: int
    initial_value: '0'    # consecutive samples agreeing with prev
  - id: nfm_ladder_committed
    type: int
    initial_value: '0'    # last press we acted on (cleared on release)

sensor:
  - platform: adc
    id: nfm_ladder
    pin: ${truck_ladder_pin}
    attenuation: 12db
    update_interval: 30ms
    internal: true
    on_value:
      then:
        - lambda: |-
            float v = x;
            int q = 0;                       // 0 = no button
            if      (v < 0.30) q = 1;
            else if (v < 0.83) q = 2;
            else if (v < 1.35) q = 3;
            else if (v < 1.96) q = 4;
            else if (v < 2.78) q = 5;
            if (q == id(nfm_ladder_prev)) {
              id(nfm_ladder_stable) += 1;
            } else {
              id(nfm_ladder_prev) = q;
              id(nfm_ladder_stable) = 0;
            }
            if (id(nfm_ladder_stable) == 1) {        // 2nd consecutive sample
              if (q == 0) {
                id(nfm_ladder_committed) = 0;        // clean release
              } else if (id(nfm_ladder_committed) != q) {
                id(nfm_ladder_committed) = q;
                id(nfm_press)->execute(q);
              }
            }
