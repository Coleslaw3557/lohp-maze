# Gate crossing game — 6 illuminated 30mm arcade buttons in two banks of 3.
# The visitor lines their body up and presses a whole bank AT ONCE:
#   bank 1 (pads 1-3) all held within the 350ms window -> CorrectAnswer chime
#   then bank 2 (pads 4-6) within 30s               -> ${gate_complete_effect}
#   bank 2 without bank 1 first                     -> WrongAnswer
# Spec: wiring-guides/room-games-plan.md. Sim/harness presses one pad at a
# time — the 350ms delayed_off hold makes three quick presses count as
# simultaneous (`call <host>:<port> press_pad pad=1` x3).
# Real S3 wiring: pads on D0-D5, button LEDs hardwired to the 5V rail.
substitutions:
  gate_complete_effect: "GateInspection"

globals:
  - id: gate_stage_ms
    type: uint32_t
    initial_value: '0'

api:
  actions:
    - action: press_pad
      variables:
        pad: int
      then:
        - lambda: |-
            switch (pad) {
              case 1: id(gate_pad1).publish_state(true); break;
              case 2: id(gate_pad2).publish_state(true); break;
              case 3: id(gate_pad3).publish_state(true); break;
              case 4: id(gate_pad4).publish_state(true); break;
              case 5: id(gate_pad5).publish_state(true); break;
              case 6: id(gate_pad6).publish_state(true); break;
            }
        - delay: 120ms
        - lambda: |-
            switch (pad) {
              case 1: id(gate_pad1).publish_state(false); break;
              case 2: id(gate_pad2).publish_state(false); break;
              case 3: id(gate_pad3).publish_state(false); break;
              case 4: id(gate_pad4).publish_state(false); break;
              case 5: id(gate_pad5).publish_state(false); break;
              case 6: id(gate_pad6).publish_state(false); break;
            }

binary_sensor:
  - platform: template
    id: gate_pad1
    name: "${room} pad 1"
    publish_initial_state: true
    filters: [delayed_off: 350ms]   # hold: 3 near-simultaneous presses overlap
    on_press:
      then: [script.execute: gate_check_bank1]
  - platform: template
    id: gate_pad2
    name: "${room} pad 2"
    publish_initial_state: true
    filters: [delayed_off: 350ms]
    on_press:
      then: [script.execute: gate_check_bank1]
  - platform: template
    id: gate_pad3
    name: "${room} pad 3"
    publish_initial_state: true
    filters: [delayed_off: 350ms]
    on_press:
      then: [script.execute: gate_check_bank1]
  - platform: template
    id: gate_pad4
    name: "${room} pad 4"
    publish_initial_state: true
    filters: [delayed_off: 350ms]
    on_press:
      then: [script.execute: gate_check_bank2]
  - platform: template
    id: gate_pad5
    name: "${room} pad 5"
    publish_initial_state: true
    filters: [delayed_off: 350ms]
    on_press:
      then: [script.execute: gate_check_bank2]
  - platform: template
    id: gate_pad6
    name: "${room} pad 6"
    publish_initial_state: true
    filters: [delayed_off: 350ms]
    on_press:
      then: [script.execute: gate_check_bank2]

script:
  - id: gate_check_bank1
    mode: single   # single = built-in cooldown while the script sleeps
    then:
      - if:
          condition:
            lambda: 'return id(gate_pad1).state && id(gate_pad2).state && id(gate_pad3).state;'
          then:
            - lambda: 'id(gate_stage_ms) = millis();'
            - logger.log: "Gate bank 1 simultaneous — chime"
            - script.execute:
                id: gate_fire
                effect: "CorrectAnswer"
            - delay: 2s
  - id: gate_check_bank2
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(gate_pad4).state && id(gate_pad5).state && id(gate_pad6).state;'
          then:
            - if:
                condition:
                  lambda: 'return id(gate_stage_ms) != 0 && (millis() - id(gate_stage_ms)) < 30000;'
                then:
                  - lambda: 'id(gate_stage_ms) = 0;'
                  - logger.log: "Gate bank 2 — room complete"
                  - script.execute:
                      id: gate_fire
                      effect: "${gate_complete_effect}"
                else:
                  - logger.log: "Gate bank 2 before bank 1 — fail"
                  - script.execute:
                      id: gate_fire
                      effect: "WrongAnswer"
            - delay: 2s
  - id: gate_fire
    mode: queued
    parameters:
      effect: string
    then:
      - http_request.post:
          url: http://${server_host}:5000/api/run_effect
          request_headers:
            Content-Type: application/json
          json: !lambda |-
            root["room"] = "${room}";
            root["effect_name"] = effect;
