# Real-node platform: Seeed XIAO ESP32-S3 — the fleet standard since the audio
# revisit (wiring-guides/room-node-audio-plan.md): audio mixing (music bed +
# effect cue) needs PSRAM, so ALL nodes are S3; the C3s stay as bench/spares.
# Swap this in (instead of sim_host.yaml) in a room's packages when flashing
# real hardware, then add the room's sensor block and (speaker rooms) the
# audio packages: audio_s3.yaml + the generated audio/cues-<node>.yaml.
#
# XIAO pin-position note (wiring guides are keyed to Dx positions): the Dx pads
# sit in the same physical spots as the C3 but map to different GPIOs — D1
# (button contract) = GPIO2 here vs GPIO3 on C3, so button rooms must set
#   button_pin: GPIO2
# in their substitutions. I2S lives on D8/D9/D10 = GPIO7/8/9 (audio_s3.yaml).
esp32:
  board: seeed_xiao_esp32s3
  framework:
    type: esp-idf

# XIAO ESP32S3 = S3R8: 8MB octal PSRAM. This is what buys the dual
# media+announcement audio pipeline and buffered HTTP music streaming.
psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none   # keeps draw above power-bank auto-off thresholds

ota:
  - platform: esphome
