# Shared node base — identical between simulated (host) and real (ESP32-C3) nodes.
# Every room node includes this; the actual triggers are separate packages so a
# room can carry any mix of them:
#   tripwire.yaml   doorway crossing -> POST run_effect ${effect}
#   button.yaml     physical button  -> POST run_effect ${button_effect}
# A node with neither (exit/temple/vertical-moop-march today) is just an API
# bench node until its bespoke effect gets designed.
#
# Expected substitutions (set per room in rooms/*.yaml):
#   node_name, room, server_host, api_port

esphome:
  name: ${node_name}
  friendly_name: "LoHP ${room} node"

logger:
  level: INFO

api:
  port: ${api_port}
  reboot_timeout: 0s   # sims/bench nodes must not reboot when no HA is connected

# The server holds /api/run_effect open until the effect finishes (up to ~15s)
# and ESPHome's http_request blocks the node's whole loop while waiting — a
# trip/press during that hold would queue behind it. 3s is enough to deliver
# the POST and hear the effect start; hanging up early does NOT cancel the
# effect (verified against the sim server 2026-07-17: effect + photo capture
# completed after a 1s client disconnect).
http_request:
  timeout: 3s
