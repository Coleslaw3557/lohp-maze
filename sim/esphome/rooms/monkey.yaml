# Monkey Room sensor node — trigger map from triggers.json
# No doorway trigger (the Lightning-on-entry placeholder was test wiring). The
# BUTTON is closed by the silver monkey puzzle when the assembly seats home ->
# MonkeyBusiness (Shrine of the Silver Monkey fanfare + gold flashes).
substitutions:
  node_name: lohp-node-monkey
  room: "Monkey Room"
  button_effect: "MonkeyBusiness"
  server_host: "127.0.0.1"   # sim: local server; real node: 192.168.1.238
  api_port: "6072"
  host_mac: "06:35:69:00:00:0c"

packages:
  logic: !include ../packages/logic.yaml
  button: !include ../packages/button.yaml       # + button_gpio_c3.example.yaml on hardware
  platform: !include ../packages/sim_host.yaml   # -> hardware_s3.yaml when flashing (S3 = fleet standard)

