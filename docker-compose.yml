services:
  escape-room-control:
    container_name: lohp-server
    build: .
    ports:
      - "5000:5000"
      - "8765:8765"
    # USB passthrough removed 2026-07-22: DMX is Art-Net to the room nodes now
    # (dmx_nodes.json / wiring-guides/dmx-over-wifi.md). If ftdi:true ever
    # resurrects the wired chain, restore:
    #   devices: ["/dev/bus/usb:/dev/bus/usb"]
    # NOTE bridge networking cannot resolve .local — dmx_nodes.json hosts must
    # be IPs (DHCP reservations) in production.
    privileged: true  # required for /api/shutdown (sysrq power-off)
    volumes:
      - .:/app
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        mode: "non-blocking"
        max-buffer-size: "4m"
