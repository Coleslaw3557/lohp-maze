services:
  escape-room-control:
    container_name: lohp-server
    build: .
    ports:
      - "5000:5000"
      - "8765:8765"
    devices:
      - "/dev/bus/usb:/dev/bus/usb"  # FTDI USB-DMX interface
    privileged: true  # USB access; also required for /api/shutdown (sysrq power-off)
    volumes:
      - .:/app
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        mode: "non-blocking"
        max-buffer-size: "4m"
