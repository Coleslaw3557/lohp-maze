services:
  remote-unit-client:
    container_name: lohp-client
    build: .
    devices:
      - "/dev/snd:/dev/snd"
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/i2c-1:/dev/i2c-1"
    privileged: true  # GPIO/I2C access; also required for shutdown (sysrq power-off)
    volumes:
      - ./:/app
      - ./cache:/app/cache
    environment:
      - PYTHONUNBUFFERED=1
      - UNIT_CONFIG=${UNIT_CONFIG:-config-single-pi.json}
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        mode: "non-blocking"
        max-buffer-size: "4m"
